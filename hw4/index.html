<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>HW4 - 景點搜尋分頁系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h1>景點觀光展覽資訊</h1>

    <div class="mb-3">
        <label for="searchInput" class="form-label">名稱搜尋：</label>
        <input type="text" id="searchInput" class="form-control" placeholder="輸入關鍵字後點擊空白處搜尋..." onchange="searchData()">
    </div>

    <table id="csie" class="table table-striped table-hover">
        <thead>
            <tr>
                <th>名稱</th>
                <th>地點</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <div class="d-flex justify-content-between align-items-center">
        <button class="btn btn-secondary" onclick="prevPage()">上一頁</button>
        <span id="pageInfo">第 1 / 1 頁</span>
        <button class="btn btn-secondary" onclick="nextPage()">下一頁</button>
    </div>

    <script src="script.js"></script>
</body>
</html>

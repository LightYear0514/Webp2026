<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Lab9 - Flickr 照片牆</title>
    <style>
        /* 講義 Page 17 的照片牆樣式 */
        .gallery {
            --g: 6px; /* 間距 */
            display: grid;
            width: 1200px;
            aspect-ratio: 1;
            grid: auto-flow 1fr / repeat(3, 1fr);
            gap: var(--g);
            margin-top: 20px;
        }

        .gallery img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(); /* 預設灰階 */
            cursor: pointer;
            transition: .5s;
        }

        .gallery img:hover {
            filter: grayscale(0); /* 滑鼠移入變彩色 */
        }

        /* 講義規定的特殊拼貼形狀 */
        .gallery img:nth-child(2) {
            grid-area: 1/2/span 2/span 2;
            clip-path: polygon(0 0, 100% 0, 100% 100%, calc(50% + var(--g)/4) 100%, 0 calc(50% - var(--g)/4));
        }

        .gallery img:nth-child(3) {
            grid-area: 2/1/span 2/span 2;
            clip-path: polygon(0 0, calc(50% - var(--g)/4) 0, 100% calc(50% + var(--g)/4), 100% 100%, 0 100%);
        }
    </style>
</head>
<body>
    <h2>長庚大學資工系 Lab9 - Flickr API 練習</h2>
    <button onclick="getFlickrImg()">取得最近照片 (Flickr API)</button>
    
    <div id="gallery" class="gallery"></div>

    <script src="script.js"></script>
</body>
</html>
